server:
  max_upload_bytes: 10737418240  # 10GB
  max_note_image_bytes: 104857600  # 100MB
  cors_allow_origins:
    - "http://localhost:3000"
  rate_limit_storage_uri: "memory://"
  api_key: ""
  run_worker: true

rate_limits:
  default_per_day: 100000
  default_per_hour: 10000
  upload_per_minute: 100
  generate_per_hour: 1000

app:
  debug: false
  data_dir: data
  logging:
    # Global log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
    # Can be overridden with DEEPLECTURE_LOG_LEVEL environment variable
    level: INFO
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    # Specific logger levels (override global level)
    # Claude Code trace logs are available under: deeplecture.claude_code.trace
    # Enable with: DEEPLECTURE_CLAUDE_TRACE=true or set level below to DEBUG
    loggers: {}
    # Example to enable Claude Code trace logs:
    # loggers:
    #   deeplecture.claude_code.trace: DEBUG

ask:
  default_context_window_seconds: 30.0
  max_history_messages: 8

note:
  max_concurrency: 16
  # NOTE: default_language removed - must be passed from frontend request

llm:
  max_rpm: 10000
  max_retries: 3
  retry_min_wait: 1.0
  retry_max_wait: 60.0
  models:
    - name: default
      provider: openai
      model: gpt-5.2
      api_key: ""
      base_url: https://api.openai.com/v1
      max_tokens: 65536
      temperature: 0.7

slides:
  lecture:
    cleanup_temp: true
    neighbor_images: next
    page_break_silence_seconds: 1.0
    summary_lookback_pages: -1
    transcript_lookback_pages: 3
    tts_language: source
    tts_max_workers: 2
    video_workers: 1
    sample_rate: 44100
  explanation:
    subtitle_context_window_seconds: 30.0

subtitle:
  engine: whisper_cpp
  # NOTE: source_language removed - must be passed from frontend request
  use_mock: false
  whisper_cpp:
    # Model selection: tiny, base, small, medium, large-v2, large-v3, large-v3-turbo
    model_name: large-v3-turbo
    # Optional: override auto-resolved paths (leave empty for auto)
    model_path: ""
    whisper_bin: ""
    whisper_cpp_dir: whisper.cpp
    # Auto-download model and build whisper.cpp if not present
    auto_download: true
    # threads: auto-detected based on hardware
    flash_attn: true  # Metal/CUDA Flash Attention acceleration
    # Anti-hallucination settings (see _archive/notes/whisper.md)
    beam_size: 1      # beam_size=1 minimizes hallucination (arXiv 2501.11378)
    best_of: 1        # consistent with beam_size=1
    max_context: 0    # 0 = disable context conditioning (equivalent to condition_on_previous_text=False)
  faster_whisper:
    # Model selection: tiny, base, small, medium, large-v2, large-v3, large-v3-turbo
    model_size: large-v3-turbo
    device: auto
    compute_type: auto
    download_root: ""
  translation:
    batch_size: 10
    # NOTE: target_language removed - must be passed from frontend request
  enhancement:
    merge_window: 3
    overlap: 1
    max_output_chars: 160
    background_max_chars: 8000
    temperature: 0.2
    batch_size: 50
    max_concurrency: 4
  timeline:
    # NOTE: output_language removed - must be passed from frontend request
    temperature: 0.3
    max_workers: 16

voiceover:
  sample_rate: 44100
  failure_threshold_ratio: 0.5
  silence_fallback_duration: 0.5
  max_retries: 3
  retry_min_wait: 1.0
  retry_max_wait: 60.0

tts:
  max_rpm: 10000
  max_retries: 3
  retry_min_wait: 1.0
  retry_max_wait: 60.0
  sample_rate: 24000
  max_sentence_duration: 8.0
  models:
    - name: fishaudio-default
      provider: fishaudio
      fishaudio:
        api_key: ""
        base_url: https://api.fish.audio
        model: s1
        reference_id: ""
        base_speed: 1.0
        format: wav
        latency: balanced
    - name: edge-default
      provider: edge_tts
      edge_tts:
        voice: zh-CN-XiaoxiaoNeural

tasks:
  enabled: true
  workers: 4
  queue_max_size: 1000
  default_timeout_seconds: 3600  # 1 hour
  completed_task_ttl_seconds: 3600  # 1 hour
  cleanup_interval_seconds: 300  # 5 minutes
  sse_subscriber_queue_size: 100
  parallelism:
    default: 8
